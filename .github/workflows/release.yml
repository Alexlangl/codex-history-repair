name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  PACKAGE: codex-history-repair

jobs:
  cli:
    name: CLI ${{ matrix.suffix }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: macos-arm64
            archive_ext: tar.gz
            exe_ext: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: macos-x64
            archive_ext: tar.gz
            exe_ext: ""
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-x64
            archive_ext: tar.gz
            exe_ext: ""
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            suffix: linux-arm64
            archive_ext: tar.gz
            exe_ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: windows-x64
            archive_ext: zip
            exe_ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build CLI archive
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="${PACKAGE}-${VERSION}-${{ matrix.suffix }}.${{ matrix.archive_ext }}"
          STAGING="dist-work/${PACKAGE}-${VERSION}-${{ matrix.suffix }}"
          mkdir -p release-assets "${STAGING}"

          cargo build -p "${PACKAGE}" --release --target "${{ matrix.target }}"
          cp "target/${{ matrix.target }}/release/${PACKAGE}${{ matrix.exe_ext }}" "${STAGING}/"
          cp README.md README.en.md LICENSE "${STAGING}/"

          if [[ "${{ matrix.archive_ext }}" == "zip" ]]; then
            powershell -NoProfile -Command "Compress-Archive -Path '${STAGING}/*' -DestinationPath 'release-assets/${ARCHIVE}'"
          else
            tar -C "${STAGING}" -czf "release-assets/${ARCHIVE}" .
          fi

      - name: Upload CLI release asset
        uses: softprops/action-gh-release@v2
        with:
          name: Codex History Repair ${{ github.ref_name }}
          body: CLI archives and desktop app bundles.
          draft: false
          prerelease: false
          files: release-assets/*

      - name: Upload CLI artifact for Homebrew
        if: startsWith(matrix.suffix, 'macos-')
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.suffix }}
          path: release-assets/*

  homebrew:
    name: Homebrew tap
    runs-on: ubuntu-latest
    needs: cli
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: cli-macos-*
          path: release-assets
          merge-multiple: true

      - name: Update Homebrew tap
        shell: bash
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          ARM_ARCHIVE="${PACKAGE}-${VERSION}-macos-arm64.tar.gz"
          X64_ARCHIVE="${PACKAGE}-${VERSION}-macos-x64.tar.gz"
          ARM_SHA="$(sha256sum "release-assets/${ARM_ARCHIVE}" | awk '{print $1}')"
          X64_SHA="$(sha256sum "release-assets/${X64_ARCHIVE}" | awk '{print $1}')"
          BASE_URL="https://github.com/Alexlangl/${PACKAGE}/releases/download/v${VERSION}"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/Alexlangl/homebrew-tap.git" tap
          mkdir -p tap/Formula

          cat > tap/Formula/codex-history-repair.rb <<EOF
          class CodexHistoryRepair < Formula
            desc "Repair local Codex history after provider switching"
            homepage "https://github.com/Alexlangl/codex-history-repair"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE_URL}/${ARM_ARCHIVE}"
                sha256 "${ARM_SHA}"
              else
                url "${BASE_URL}/${X64_ARCHIVE}"
                sha256 "${X64_SHA}"
              end
            end

            def install
              bin.install "codex-history-repair"
            end

            test do
              system "#{bin}/codex-history-repair", "--help"
            end
          end
          EOF

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/codex-history-repair.rb
          if git diff --cached --quiet; then
            echo "Homebrew formula is already up to date"
          else
            git commit -m "Update codex-history-repair to ${VERSION}"
            git push
          fi

  app:
    name: App ${{ matrix.suffix }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: --target universal-apple-darwin
            suffix: macos-universal
          - os: macos-latest
            args: --target x86_64-apple-darwin
            suffix: macos-x64
          - os: macos-latest
            args: --target aarch64-apple-darwin
            suffix: macos-arm64
          - os: windows-latest
            args: ""
            suffix: windows-x64
          - os: ubuntu-latest
            args: ""
            suffix: linux-x64
          - os: ubuntu-24.04-arm
            args: ""
            suffix: linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install macOS Rust targets
        if: runner.os == 'macOS'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri bundle
        run: pnpm tauri build ${{ matrix.args }}

      - name: Normalize app release asset names
        env:
          CHR_VERSION: ${{ github.ref_name }}
          CHR_ARTIFACT_SUFFIX: ${{ matrix.suffix }}
        run: node scripts/rename-tauri-artifacts.mjs

      - name: Upload app release assets
        uses: softprops/action-gh-release@v2
        with:
          name: Codex History Repair ${{ github.ref_name }}
          body: CLI archives and desktop app bundles.
          draft: false
          prerelease: false
          files: release-assets/*
